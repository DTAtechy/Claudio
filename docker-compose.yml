services:
  postgres:
    image: postgres:16-alpine
    container_name: claudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: claudio
      POSTGRES_PASSWORD: claudio_dev_password
      POSTGRES_DB: claudio
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claudio -d claudio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
